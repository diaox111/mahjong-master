<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mahjong Master - Sheep-a-Sheep Puzzle Game | Free Online</title>
<meta name="description" content="Play the viral Mahjong Sheep-a-Sheep style puzzle game free online. Stack mahjong tiles, match 3 to clear. Two levels - easy and insane. No download.">
<meta name="keywords" content="mahjong puzzle, sheep a sheep, mahjong match, mahjong stacking, mahjong master">
<link rel="canonical" href="https://mahjongmaster.example.com/play.html">
<meta property="og:title" content="Mahjong Master - Sheep Puzzle">
<meta property="og:description" content="Stack, match, clear. Two levels of pure puzzle joy.">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="game-body">
<div class="game-header">
  <div class="game-title">
    <span class="game-title-zh">麻了个雀</span>
    <span class="game-title-en">Mahjong Master</span>
  </div>
  <div class="game-status">
    <div class="status-item">
      <div class="status-label">Level</div>
      <div class="status-value" id="level-num">Level 1 / 2</div>
    </div>
    <div class="status-item">
      <div class="status-label">Difficulty</div>
      <div class="status-value" id="level-name">Easy</div>
    </div>
    <div class="status-item">
      <div class="status-label">Tiles Left</div>
      <div class="status-value" id="count-remaining">0</div>
    </div>
    <div class="status-item">
      <div class="status-label">Slot</div>
      <div class="status-value" id="count-slot">0 / 7</div>
    </div>
  </div>
</div>

<div id="game-area" class="game-area"></div>

<div class="game-controls">
  <div class="removed-row">
    <div class="row-label">Removed:</div>
    <div id="removed" class="removed-slot"></div>
  </div>
  <div class="slot-row">
    <div class="row-label">Slot:</div>
    <div id="slot" class="active-slot"></div>
  </div>
  <div class="buttons">
    <button id="btn-remove" class="btn btn-primary">Move Out 3</button>
    <button id="btn-back" class="btn btn-secondary">Undo</button>
    <button id="restart-btn" class="btn btn-restart" style="display:none">Restart</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<a href="/" class="back-link">&larr; Back to Home</a>

<script src="/js/game.js"></script>
</body>
</html>
